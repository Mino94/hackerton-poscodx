# Parent Agent별 Sub-Agent — 세분화 분석 후 synthesizer가 통합한다.
# llm_tier: local(Ollama 우선) | cloud(OpenAI 우선) | auto(cloud→local→fallback)

pm_orchestrator_agent:
  - id: structure_planner
    role: 구조·목차 설계 Sub-Agent
    goal: 추진계획서 목적·배경·강조 포인트에 맞는 섹션 목차와 각 섹션 1줄 목적을 bullet로 작성하라.
    llm_tier: local
  - id: deliverable_mapper
    role: 산출물·역할 매핑 Sub-Agent
    goal: 단계별 산출물, 담당(RACI 수준), 의존 관계를 Markdown 표로 작성하라.
    llm_tier: local
  - id: orchestrator_synthesizer
    role: Orchestrator 통합 Sub-Agent
    goal: 위 Sub-Agent 결과를 하나의 Executive 관점 추진계획 구조 요약(1페이지)으로 통합하라.
    llm_tier: cloud

requirement_interview_agent:
  - id: gap_finder
    role: 누락 정보 식별 Sub-Agent
    goal: proposal 맥락에서 누락·모호한 사업/시스템/조직 정보를 bullet로 나열하라.
    llm_tier: local
  - id: assumption_writer
    role: 가정값 작성 Sub-Agent
    goal: 누락 항목에 대한 합리적 가정을 표 형태로 작성하고 (가정)을 명시하라.
    llm_tier: local
  - id: requirement_synthesizer
    role: 요구사항 통합 Sub-Agent
    goal: 누락·가정·추가 확인 질문을 하나의 요구사항 정리 Markdown으로 통합하라.
    llm_tier: cloud

business_analyst_agent:
  - id: as_is_mapper
    role: AS-IS 프로세스 Sub-Agent
    goal: 현재 업무/시스템 AS-IS를 단계별 bullet·간단 표로 작성하라.
    llm_tier: local
  - id: pain_analyst
    role: Pain Point Sub-Agent
    goal: 핵심 문제 3~5개, 영향(시간/품질/리스크)을 bullet로 작성하라.
    llm_tier: local
  - id: stakeholder_analyst
    role: 이해관계자 Sub-Agent
    goal: 부서·역할·관심사·영향도를 표로 작성하라.
    llm_tier: local
  - id: business_synthesizer
    role: 현황 분석 통합 Sub-Agent
    goal: AS-IS·Pain·이해관계자 분석을 하나의 Business Analysis Markdown으로 통합하라.
    llm_tier: cloud

solution_architect_agent:
  - id: to_be_designer
    role: TO-BE 프로세스 Sub-Agent
    goal: 개선 후 목표 프로세스를 단계별 TO-BE로 작성하라.
    llm_tier: local
  - id: automation_scoper
    role: 자동화 범위 Sub-Agent
    goal: 자동화/RPA/배치/검증 룰 등 자동화 범위를 bullet로 작성하라.
    llm_tier: local
  - id: architecture_sketcher
    role: 시스템 구성 Sub-Agent
    goal: 시스템·모듈·데이터 흐름을 텍스트 다이어그램(ASCII) 또는 bullet로 작성하라.
    llm_tier: local
  - id: solution_synthesizer
    role: 솔루션 통합 Sub-Agent
    goal: TO-BE·자동화·시스템 구성을 Solution Direction Markdown으로 통합하라.
    llm_tier: cloud

development_scope_agent:
  - id: in_scope_lister
    role: 포함 범위 Sub-Agent
    goal: MVP 포함 기능을 우선순위와 함께 bullet로 작성하라.
    llm_tier: local
  - id: out_scope_lister
    role: 제외 범위 Sub-Agent
    goal: 명시적 제외 항목과 이유를 bullet로 작성하라.
    llm_tier: local
  - id: module_mapper
    role: 모듈·컴포넌트 Sub-Agent
    goal: 주요 모듈/컴포넌트와 책임을 표로 작성하라.
    llm_tier: local
  - id: scope_synthesizer
    role: 개발 범위 통합 Sub-Agent
    goal: 포함/제외/모듈을 Development Scope Markdown으로 통합하라.
    llm_tier: cloud

wbs_planner_agent:
  - id: phase_breakdown
    role: 단계 분해 Sub-Agent
    goal: 추진 단계(킥오프·분석·구현·파일럿 등)를 bullet로 작성하라.
    llm_tier: local
  - id: milestone_planner
    role: 마일스톤 Sub-Agent
    goal: 마일스톤·완료 기준·담당을 표로 작성하라.
    llm_tier: local
  - id: wbs_synthesizer
    role: WBS 통합 Sub-Agent
    goal: 단계·마일스톤을 WBS Markdown 표(단계|작업|기간|담당|산출물)로 통합하라.
    llm_tier: cloud

budget_roi_agent:
  - id: cost_estimator
    role: 예산 항목 Sub-Agent
    goal: 예산 항목·예상 비용·설명을 표로 작성(모든 금액에 가정 명시)하라.
    llm_tier: local
  - id: kpi_estimator
    role: KPI Sub-Agent
    goal: KPI 지표·현재·목표를 표로 작성(가정)하라.
    llm_tier: local
  - id: roi_calculator
    role: ROI·절감 Sub-Agent
    goal: 시간/비용 절감 가설과 ROI 논리를 bullet로 작성(가정)하라.
    llm_tier: local
  - id: budget_synthesizer
    role: 예산·ROI 통합 Sub-Agent
    goal: 예산·KPI·ROI를 Budget & ROI Markdown으로 통합하라.
    llm_tier: cloud

risk_critic_agent:
  - id: risk_identifier
    role: 리스크 식별 Sub-Agent
    goal: 리스크 5~8개를 bullet로 나열하라.
    llm_tier: local
  - id: impact_assessor
    role: 영향도·가능성 Sub-Agent
    goal: 각 리스크의 발생 가능성·영향도를 표로 작성하라.
    llm_tier: local
  - id: mitigation_planner
    role: 대응 방안 Sub-Agent
    goal: 리스크별 대응 방안·담당·시점을 bullet로 작성하라.
    llm_tier: local
  - id: risk_synthesizer
    role: 리스크 통합 Sub-Agent
    goal: 리스크 매트릭스 Markdown 표로 통합하라.
    llm_tier: cloud

storyline_slide_planning_agent:
  - id: narrative_arc
    role: 스토리 아크 Sub-Agent
    goal: 보고 대상·PPT 톤에 맞는 슬라이드 흐름(10장 전후)을 bullet 제목만 나열하라.
    llm_tier: local
  - id: slide_message_planner
    role: 슬라이드 메시지 Sub-Agent
    goal: 각 슬라이드 핵심 메시지 1줄을 bullet로 작성하라.
    llm_tier: local
  - id: storyline_synthesizer
    role: Storyline JSON Sub-Agent
    goal: 슬라이드 JSON(slides 배열, slide_no/title/objective/key_message/layout_type/visual_type)을 생성하라.
    llm_tier: cloud

visualization_agent:
  - id: visual_type_picker
    role: 시각 유형 Sub-Agent
    goal: 각 슬라이드에 AGENTS.md visual_type 중 하나를 지정하고 이유 1줄을 bullet로 작성하라.
    llm_tier: local
  - id: content_outliner
    role: 콘텐츠 아웃라인 Sub-Agent
    goal: 슬라이드별 content dict에 넣을 키·값 구조를 bullet로 설계하라.
    llm_tier: local
  - id: visualization_synthesizer
    role: Visualization JSON Sub-Agent
    goal: slides 배열 JSON(visual_type, content)을 완성하라.
    llm_tier: cloud

presentation_graphics_agent:
  - id: tone_stylist
    role: 장표 스타일 Sub-Agent
    goal: presentation_tone에 맞는 색·밀도·도형 스타일 지침을 bullet로 작성하라.
    llm_tier: local
  - id: graphics_spec_builder
    role: graphics_spec Sub-Agent
    goal: 슬라이드별 graphics_spec 초안을 bullet로 작성하라.
    llm_tier: local
  - id: graphics_synthesizer
    role: Graphics JSON Sub-Agent
    goal: graphics_spec JSON을 완성하라.
    llm_tier: cloud

ppt_composer_agent:
  - id: deck_validator
    role: 덱 검증 Sub-Agent
    goal: 슬라이드 수·필수 키·visual_type 누락을 체크리스트로 작성하라.
    llm_tier: local
  - id: composer_synthesizer
    role: Composer JSON Sub-Agent
    goal: 최종 SlideDeckSpec JSON(slides)을 출력하라.
    llm_tier: cloud

critic_agent:
  - id: consistency_checker
    role: 일관성 검토 Sub-Agent
    goal: 섹션 간 모순·용어 불일치를 bullet로 작성하라.
    llm_tier: local
  - id: feasibility_checker
    role: 실행 가능성 Sub-Agent
    goal: 일정·범위·예산 현실성을 bullet로 평가하라.
    llm_tier: local
  - id: critic_synthesizer
    role: Critic 통합 Sub-Agent
    goal: CRITIC_SCORE/STATUS/FEEDBACK_TARGET/IMPROVEMENT_NOTES/FINAL_RECOMMENDATION 형식으로 출력하라.
    llm_tier: cloud

documentation_agent:
  - id: section_assembler
    role: 섹션 조립 Sub-Agent
    goal: 각 섹션 요약을 AGENTS.md 목차 번호에 맞게 bullet로 매핑하라.
    llm_tier: local
  - id: doc_synthesizer
    role: 문서 통합 Sub-Agent
    goal: 전체 추진계획서 Markdown(§12 제외)을 통합 작성하라.
    llm_tier: cloud
