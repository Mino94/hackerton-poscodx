# Streamlit Cloud → App settings → Secrets 에 붙여넣기 (데모 기본값)
# OPENAI_API_KEY 없어도 Fallback PPT·Mock Agent로 동작합니다.

OPENAI_API_KEY = ""
OPENAI_MODEL = "gpt-4o-mini"
OPEN_SOURCE_LLM_PROVIDER = "mock"

AUTOPM_PPT_API = "python-pptx"
AUTOPM_PRESENTON_USE_MCP = "false"
AUTOPM_USE_CHROMA_RAG = "true"
CHROMA_PERSIST_DIR = "/tmp/chroma_autopm"
AUTOPM_SKIP_PROGRESS_SIM = "true"
AUTOPM_GUIDED_DIALOGUE_ROUNDS = "1"
AUTOPM_ENABLE_SUBAGENTS = "true"
AUTOPM_DIALOGUE_ROUNDS = "1"

